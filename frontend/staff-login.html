<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b1535;
            background-image: radial-gradient(ellipse at 50% 35%, #1a2d6b 0%, #0b1535 65%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(65, 105, 225, 0.35);
            border-radius: 24px;
            padding: 48px 40px 40px;
            max-width: 400px;
            width: 100%;
            position: relative;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 40px rgba(65,105,225,0.08);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4169E1 30%, #6B8FFF 50%, #4169E1 70%, transparent);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 0 20px rgba(65, 105, 225, 0.8);
        }

        .lock-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 18px;
        }

        h1 {
            color: white;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
            margin-bottom: 36px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(65, 105, 225, 0.3);
            border-radius: 14px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-align: center;
            letter-spacing: 6px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 4px;
        }

        input:focus {
            outline: none;
            border-color: #4169E1;
            box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            background: #4169E1;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 24px rgba(65, 105, 225, 0.5);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(65, 105, 225, 0.65);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #fca5a5;
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            font-size: 14px;
            margin-top: 14px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: rgba(255, 255, 255, 0.75);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1>Staff Login</h1>
        <p class="subtitle">Enter your PIN to access the dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="pin">PIN Number</label>
                <input type="password" id="pin" name="pin" maxlength="4" pattern="[0-9]{4}" required placeholder="••••">
            </div>

            <button type="submit">Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="back-link">
            <a href="kiosk.html">← Back to Customer Kiosk</a>
        </div>
    </div>

    <script>
        // Dynamic API URL - works locally and in production
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
            ? 'http://localhost:3001/api'
            : '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const pin = document.getElementById('pin').value;

            try {
                const response = await fetch(`${API_URL}/staff/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ pin })
                });

                const data = await response.json();

                if (data.success) {
                    // Store staff info in session storage
                    sessionStorage.setItem('staffPin', data.staff.pin);
                    sessionStorage.setItem('staffName', data.staff.name);

                    // Redirect to dashboard
                    window.location.href = 'staff-dashboard.html';
                } else {
                    showError(data.error || 'Invalid PIN');
                }
            } catch (error) {
                showError('Unable to connect to server. Please try again.');
            }
        });

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        // Auto-focus on PIN input
        document.getElementById('pin').focus();
    </script>
</body>
</html>
